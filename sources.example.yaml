# Example source manifest for `onec-vecgraph ingest`.
# One file per tenant (project). Each entry is a corpus; all are scoped to the tenant.
#   onec-vecgraph ingest sources.example.yaml --tenant-id projectA [--reset] [--link-semantic]
# Run with --only <type> to ingest a single corpus.

tenant: projectA            # optional; --tenant-id overrides

sources:
  # The 1C configuration itself (rich typed pipeline: index + callgraph + vectorize).
  - type: config_dump
    path: /dumps/ERP_UH     # local path (mount the dump into the container at runtime)
    code: true              # also vectorize BSL code (cAST)
    callgraph: true         # also build the BSL call graph

  # Project documentation/artifacts from a git repository (Markdown/AsciiDoc).
  - type: git_artifacts
    repo: git@example.com:projectA/docs.git   # or: path: /local/dir for offline
    branch: main
    globs: ["**/*.md", "docs/**/*.adoc"]

  # 1C:ITS — the normalized output of the EXTERNAL ITS parser, in a git repo.
  # Format contract: docs/ITS_PARSER_REQUIREMENTS.md
  - type: its
    repo: git@example.com:projectA/its-normalized.git   # or: path: /its/projectA
    branch: main
    globs: ["**/*.json"]

  # 1C platform help (syntax assistant) from .hbk — PUBLIC: ingest into the shared tenant
  #   onec-vecgraph ingest sources.example.yaml --tenant-id __shared__ --only hbk
  # version is parsed from the bin path; one entry per build, or a glob for all installed builds.
  - type: hbk
    bin: "C:/Program Files/1cv8/8.3.27.1989/bin"   # auto-discovers sh*_ru.hbk
    domains: [shcntx, shlang]                       # context + language (add shquery if needed)
    # bins: ["C:/Program Files/1cv8/*/bin"]         # alt: all installed builds (each its own version)
    # files: ["/help/shcntx_ru.hbk"]                # alt: explicit file paths
    # platform_version: "8.3.27.1989"               # explicit override (else from path)
    # limit: 500                                     # cap pages per file (smoke/dev)
